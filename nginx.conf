# Блок HTTP
server {
    listen 80;
    server_name voitspace.ru www.voitspace.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Блок HTTPS
server {
    listen 443 ssl;
    server_name voitspace.ru www.voitspace.ru;

    # Пути к сертификатам, которые сгенерировал Certbot
    ssl_certificate /etc/letsencrypt/live/voitspace.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/voitspace.ru/privkey.pem;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
    }
}
