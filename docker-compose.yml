services:
  frontend:
    image: nginx:latest
    container_name: voit-frontend
    ports:
      - "80:80"
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html:ro
      - ./logs/nginx:/var/log/nginx
    restart: always

  database:
    image: postgres:15-alpine
    container_name: voit-db
    environment:
      POSTGRES_USER: voit_admin
      POSTGRES_PASSWORD: super_secret_password
      POSTGRES_DB: voit_music_data
    restart: always

  pgadmin:
    image: dpage/pgadmin4
    container_name: voit-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@voit.ru
      PGADMIN_DEFAULT_PASSWORD: super_secret_password
    ports:
      - "5050:80"
    restart: always
